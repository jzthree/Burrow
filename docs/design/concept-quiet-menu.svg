  <line x1="40" y1="140" x2="490" y2="140" stroke="#00000010"/>

  <!-- ===================== group: 100.64.0.42 (merged) ===================== -->
  <rect x="72" y="154" width="18" height="18" rx="5" fill="#f0f0f2"/>
  <text x="77" y="167" class="mono" font-size="9" font-weight="700" fill="#98989d">&gt;_</text>
  <text x="98" y="167" class="mono" font-size="10.5" font-weight="700" fill="#98989d" letter-spacing="0.2">100.64.0.42</text>
  <rect x="420" y="152" width="46" height="20" rx="10" fill="#f0f0f2"/>
  <circle cx="432" cy="162" r="2.6" fill="#34a853"/>
  <circle cx="440" cy="162" r="2.6" fill="#d93025"/>
  <text x="448" y="166" class="sans" font-size="10.5" font-weight="700" fill="#7a7a7e">4</text>

  <rect x="64" y="180" width="402" height="234" rx="16" fill="#fbfbfc" stroke="#00000008"/>

  <!-- row 1: Workstation: 8888 -->
  <circle cx="88" cy="208" r="8" fill="#34a853" opacity="0.12"/>
  <circle cx="88" cy="208" r="4" fill="#34a853"/>
  <text x="106" y="206" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">Workstation: 8888</text>
  <rect x="106" y="212" width="40" height="17" rx="4" fill="#f0f0f2"/>
  <text x="113" y="224" class="mono" font-size="10.5" font-weight="700" fill="#5a5a5e">8876</text>
  <text x="152" y="224" class="mono" font-size="10.5" fill="#b0b0b5">›</text>
  <text x="162" y="224" class="mono" font-size="10.5" font-weight="600" fill="#7a7a7e">8888</text>
  <text x="196" y="224" class="mono" font-size="10" fill="#c2c2c6">· ssh :4444</text>
  <g transform="translate(362,201)"><path d="M6 0 L0 7.5 L4.2 7.5 L3 13 L10 5.5 L5.6 5.5 Z" fill="#5050d6"/></g>
  <rect x="384" y="194" width="56" height="28" rx="14" fill="#ffffff" stroke="#00000018"/>
  <text x="398" y="212" class="sans" font-size="12" font-weight="600" fill="#48484c">Stop</text>
  <circle cx="450" cy="208" r="1.7" fill="#b6b6ba"/><circle cx="456" cy="208" r="1.7" fill="#b6b6ba"/><circle cx="462" cy="208" r="1.7" fill="#b6b6ba"/>
  <line x1="106" y1="238" x2="466" y2="238" stroke="#00000008"/>

  <!-- row 2: workstation:3000 -->
  <circle cx="88" cy="266" r="8" fill="#34a853" opacity="0.12"/>
  <circle cx="88" cy="266" r="4" fill="#34a853"/>
  <text x="106" y="264" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">workstation:3000</text>
  <rect x="106" y="270" width="40" height="17" rx="4" fill="#f0f0f2"/>
  <text x="113" y="282" class="mono" font-size="10.5" font-weight="700" fill="#5a5a5e">8866</text>
  <text x="152" y="282" class="mono" font-size="10.5" fill="#b0b0b5">›</text>
  <text x="162" y="282" class="mono" font-size="10.5" font-weight="600" fill="#7a7a7e">3000</text>
  <text x="196" y="282" class="mono" font-size="10" fill="#c2c2c6">· ssh :4444</text>
  <g transform="translate(362,259)"><path d="M6 0 L0 7.5 L4.2 7.5 L3 13 L10 5.5 L5.6 5.5 Z" fill="#5050d6"/></g>
  <rect x="384" y="252" width="56" height="28" rx="14" fill="#ffffff" stroke="#00000018"/>
  <text x="398" y="270" class="sans" font-size="12" font-weight="600" fill="#48484c">Stop</text>
  <circle cx="450" cy="266" r="1.7" fill="#b6b6ba"/><circle cx="456" cy="266" r="1.7" fill="#b6b6ba"/><circle cx="462" cy="266" r="1.7" fill="#b6b6ba"/>
  <line x1="106" y1="296" x2="466" y2="296" stroke="#00000008"/>

  <!-- row 3: sp-8875-web3000 -->
  <circle cx="88" cy="324" r="8" fill="#34a853" opacity="0.12"/>
  <circle cx="88" cy="324" r="4" fill="#34a853"/>
  <text x="106" y="322" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">sp-8875-web3000</text>
  <rect x="106" y="328" width="40" height="17" rx="4" fill="#f0f0f2"/>
  <text x="113" y="340" class="mono" font-size="10.5" font-weight="700" fill="#5a5a5e">8875</text>
  <text x="152" y="340" class="mono" font-size="10.5" fill="#b0b0b5">›</text>
  <text x="162" y="340" class="mono" font-size="10.5" font-weight="600" fill="#7a7a7e">3000</text>
  <text x="196" y="340" class="mono" font-size="10" fill="#c2c2c6">· ssh :3333</text>
  <g transform="translate(362,317)"><path d="M6 0 L0 7.5 L4.2 7.5 L3 13 L10 5.5 L5.6 5.5 Z" fill="#5050d6"/></g>
  <rect x="384" y="310" width="56" height="28" rx="14" fill="#ffffff" stroke="#00000018"/>
  <text x="398" y="328" class="sans" font-size="12" font-weight="600" fill="#48484c">Stop</text>
  <circle cx="450" cy="324" r="1.7" fill="#b6b6ba"/><circle cx="456" cy="324" r="1.7" fill="#b6b6ba"/><circle cx="462" cy="324" r="1.7" fill="#b6b6ba"/>
  <line x1="106" y1="354" x2="466" y2="354" stroke="#00000008"/>

  <!-- row 4: sp-8877-web8888 retrying: diagnosis replaces route -->
  <circle cx="88" cy="382" r="8" fill="#d93025" opacity="0.12"/>
  <circle cx="88" cy="382" r="4" fill="#d93025"/>
  <text x="106" y="380" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">sp-8877-web8888</text>
  <text x="106" y="398" class="mono" font-size="10.5" font-weight="600" fill="#c5221f">network issue · retry 7 in 1s</text>
  <g transform="translate(362,375)"><path d="M6 0 L0 7.5 L4.2 7.5 L3 13 L10 5.5 L5.6 5.5 Z" fill="#5050d6"/></g>
  <rect x="384" y="368" width="56" height="28" rx="14" fill="#ffffff" stroke="#00000018"/>
  <text x="398" y="386" class="sans" font-size="12" font-weight="600" fill="#48484c">Stop</text>
  <circle cx="450" cy="382" r="1.7" fill="#b6b6ba"/><circle cx="456" cy="382" r="1.7" fill="#b6b6ba"/><circle cx="462" cy="382" r="1.7" fill="#b6b6ba"/>

  <!-- ===================== group: nucleus ===================== -->
  <rect x="72" y="430" width="18" height="18" rx="5" fill="#f0f0f2"/>
  <text x="77" y="443" class="mono" font-size="9" font-weight="700" fill="#98989d">&gt;_</text>
  <text x="98" y="443" class="mono" font-size="10.5" font-weight="700" fill="#98989d" letter-spacing="0.2">hpc.university.edu</text>
  <rect x="428" y="428" width="38" height="20" rx="10" fill="#f0f0f2"/>
  <circle cx="440" cy="438" r="2.6" fill="#d93025"/>
  <text x="448" y="442" class="sans" font-size="10.5" font-weight="700" fill="#7a7a7e">1</text>

  <rect x="64" y="456" width="402" height="58" rx="16" fill="#fbfbfc" stroke="#00000008"/>
  <circle cx="88" cy="485" r="8" fill="#d93025" opacity="0.12"/>
  <circle cx="88" cy="485" r="4" fill="#d93025"/>
  <text x="106" y="483" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">hpc-4000-web3000</text>
  <text x="106" y="501" class="mono" font-size="10.5" font-weight="600" fill="#c5221f">auth failed · saved password rejected</text>
  <g transform="translate(346,478)"><path d="M6 0 L0 7.5 L4.2 7.5 L3 13 L10 5.5 L5.6 5.5 Z" fill="#5050d6"/></g>
  <rect x="368" y="471" width="72" height="28" rx="14" fill="#3b3bd0"/>
  <text x="382" y="489" class="sans" font-size="12" font-weight="700" fill="#ffffff">Connect</text>
  <circle cx="450" cy="485" r="1.7" fill="#b6b6ba"/><circle cx="456" cy="485" r="1.7" fill="#b6b6ba"/><circle cx="462" cy="485" r="1.7" fill="#b6b6ba"/>

  <!-- ===================== footer ===================== -->
  <line x1="40" y1="538" x2="490" y2="538" stroke="#00000010"/>
  <rect x="40" y="538" width="450" height="102" rx="24" fill="#f9f9fa"/>
  <rect x="40" y="538" width="450" height="24" fill="#f9f9fa"/>

  <g transform="translate(76,560)"><path d="M0 0 L9 5.5 L0 11 Z" fill="#48484c"/></g>
  <text x="92" y="570" class="sans" font-size="12" font-weight="600" fill="#48484c">Start Enabled</text>
  <rect x="186" y="560" width="10" height="10" rx="2" fill="#48484c"/>
  <text x="202" y="570" class="sans" font-size="12" font-weight="600" fill="#48484c">Stop All</text>

  <rect x="350" y="551" width="116" height="30" rx="15" fill="#141416"/>
  <text x="366" y="570" class="sans" font-size="12.5" font-weight="700" fill="#ffffff">+  New Tunnel</text>

  <circle cx="82" cy="612" r="7" fill="none" stroke="#8a8a8e" stroke-width="1.5"/>
  <circle cx="82" cy="612" r="2.5" fill="#8a8a8e"/>
  <text x="96" y="616" class="sans" font-size="11.5" font-weight="600" fill="#6a6a6e">Settings ▾</text>
  <text x="160" y="616" class="sans" font-size="10" fill="#b6b6ba">· Import · Start at Login · Quit</text>

  <!-- ===================== callout badges ===================== -->
  <circle cx="505" cy="85" r="11" fill="#3b3bd0"/><text x="501" y="89.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">1</text>
  <circle cx="505" cy="161" r="11" fill="#3b3bd0"/><text x="501" y="165.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">2</text>
  <circle cx="505" cy="208" r="11" fill="#3b3bd0"/><text x="501" y="212.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">3</text>
  <circle cx="505" cy="388" r="11" fill="#3b3bd0"/><text x="501" y="392.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">4</text>
  <circle cx="505" cy="485" r="11" fill="#3b3bd0"/><text x="501" y="489.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">5</text>
  <circle cx="505" cy="612" r="11" fill="#3b3bd0"/><text x="501" y="616.5" class="sans" font-size="12" font-weight="700" fill="#ffffff">6</text>

  <!-- ===================== annotations ===================== -->
  <text x="560" y="78" class="sans" font-size="17" font-weight="700" fill="#1d1d1f">Quieter rows, same density</text>

  <text x="560" y="116" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">1 · Health pills only when non-zero</text>
  <text x="560" y="134" class="sans" font-size="11.5" fill="#5a5a5e">“0 connecting / 0 waiting” is noise. Two numbers max,</text>
  <text x="560" y="149" class="sans" font-size="11.5" fill="#5a5a5e">full breakdown stays in the hover tooltip.</text>

  <text x="560" y="186" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">2 · Group by host, not host:port</text>
  <text x="560" y="204" class="sans" font-size="11.5" fill="#5a5a5e">100.64.0.42 was three separate groups (ssh :4444 / :3333 /</text>
  <text x="560" y="219" class="sans" font-size="11.5" fill="#5a5a5e">:2222). One machine = one group; ssh port becomes a small</text>
  <text x="560" y="234" class="sans" font-size="11.5" fill="#5a5a5e">suffix on the route line, shown only when not :22.</text>

  <text x="560" y="271" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">3 · Auto becomes a bolt toggle</text>
  <text x="560" y="289" class="sans" font-size="11.5" fill="#5a5a5e">A setting shouldn’t outshout the action. Lit bolt = auto-connect</text>
  <text x="560" y="304" class="sans" font-size="11.5" fill="#5a5a5e">on, grey = off. Saves ~50pt per row; tooltip explains it.</text>

  <text x="560" y="341" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">4 · One failure signal, not three</text>
  <text x="560" y="359" class="sans" font-size="11.5" fill="#5a5a5e">Red dot + red info chip + message was triple-coding. Failed</text>
  <text x="560" y="374" class="sans" font-size="11.5" fill="#5a5a5e">rows swap the route line for diagnosis + live countdown;</text>
  <text x="560" y="389" class="sans" font-size="11.5" fill="#5a5a5e">the route moves to the hover card. Info chip deleted.</text>

  <text x="560" y="426" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">5 · Connect is the only loud button</text>
  <text x="560" y="444" class="sans" font-size="11.5" fill="#5a5a5e">Accent only where action is needed (failed / stopped rows).</text>
  <text x="560" y="459" class="sans" font-size="11.5" fill="#5a5a5e">Healthy rows are all-quiet: dot, name, route, ghost Stop.</text>

  <text x="560" y="496" class="sans" font-size="13" font-weight="700" fill="#3b3bd0">6 · Footer keeps one primary action</text>
  <text x="560" y="514" class="sans" font-size="11.5" fill="#5a5a5e">Quit moves into the Settings menu next to Import and</text>
  <text x="560" y="529" class="sans" font-size="11.5" fill="#5a5a5e">Start at Login. Start Enabled / Stop All become text buttons.</text>

  <text x="560" y="566" class="sans" font-size="13" font-weight="700" fill="#9a9aa0">Also considered, not drawn</text>
  <text x="560" y="584" class="sans" font-size="11.5" fill="#8a8a8e">· Status line click-expands to full error text instead of truncating</text>
  <text x="560" y="599" class="sans" font-size="11.5" fill="#8a8a8e">· Compact mode (38pt rows) once a config passes ~8 tunnels</text>
  <text x="560" y="614" class="sans" font-size="11.5" fill="#8a8a8e">· ⌘1–⌘9 to connect/stop the nth tunnel while the menu is open</text>
</svg>
