  <!-- ===================== feature column ===================== -->
  <text x="540" y="78" class="sans" font-size="21" font-weight="700" fill="#1d1d1f" letter-spacing="-0.3">Stop babysitting tunnels.</text>
  <text x="540" y="101" class="sans" font-size="13" font-weight="500" fill="#7a7a7e">SSH port forwards and corporate VPNs, in one menu-bar app.</text>

  <circle cx="547" cy="146" r="3.5" fill="#5050d6"/>
  <text x="562" y="151" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">Every forward in one place</text>
  <text x="562" y="169" class="sans" font-size="11.5" fill="#5a5a5e">See at a glance what's up. Connect, stop, or copy</text>
  <text x="562" y="184" class="sans" font-size="11.5" fill="#5a5a5e">localhost:8888 in one click — then get back to work.</text>

  <circle cx="547" cy="216" r="3.5" fill="#34a853"/>
  <text x="562" y="221" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">Status you can trust</text>
  <text x="562" y="239" class="sans" font-size="11.5" fill="#5a5a5e">A tunnel turns green only when ssh truly serves its local port —</text>
  <text x="562" y="254" class="sans" font-size="11.5" fill="#5a5a5e">no lying dots. Failures say why, and count down to the retry.</text>

  <circle cx="547" cy="286" r="3.5" fill="#34a853"/>
  <text x="562" y="291" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">It heals itself</text>
  <text x="562" y="309" class="sans" font-size="11.5" fill="#5a5a5e">Reconnects through sleep, Wi-Fi changes, and VPN flaps.</text>
  <text x="562" y="324" class="sans" font-size="11.5" fill="#5a5a5e">Stale forwards are reclaimed instead of blocking the port.</text>

  <circle cx="547" cy="356" r="3.5" fill="#5050d6"/>
  <text x="562" y="361" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">VPNs that don't take over your Mac</text>
  <text x="562" y="379" class="sans" font-size="11.5" fill="#5a5a5e">A corporate VPN becomes a per-host gateway: only the tunnels you</text>
  <text x="562" y="394" class="sans" font-size="11.5" fill="#5a5a5e">pick use it. Run several at once; Tailscale and apps stay untouched.</text>

  <circle cx="547" cy="426" r="3.5" fill="#5050d6"/>
  <text x="562" y="431" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">Single sign-on built in</text>
  <text x="562" y="449" class="sans" font-size="11.5" fill="#5a5a5e">GlobalProtect and AnyConnect SAML logins open in a browser</text>
  <text x="562" y="464" class="sans" font-size="11.5" fill="#5a5a5e">window; passwords and certificate pins live in the Keychain.</text>

  <circle cx="547" cy="496" r="3.5" fill="#9a9aa0"/>
  <text x="562" y="501" class="sans" font-size="13" font-weight="700" fill="#1d1d1f">A file, not a silo</text>
  <text x="562" y="519" class="sans" font-size="11.5" fill="#5a5a5e">One JSON config with a CLI and live reload; import from</text>
  <text x="562" y="534" class="sans" font-size="11.5" fill="#5a5a5e">~/.ssh/config. It drives the system ssh — leave anytime.</text>

  <rect x="540" y="566" width="420" height="2" rx="1" fill="#00000010"/>
  <text x="540" y="596" class="mono" font-size="11.5" fill="#5a5a5e">brew install openconnect ocproxy   # for VPN gateways</text>
  <text x="540" y="616" class="mono" font-size="11.5" fill="#5a5a5e">./scripts/install-app.sh &amp;&amp; open ~/Applications/Burrow.app</text>
</svg>
